name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      # Project site is served under /InclusiveAlert.
      NEXT_PUBLIC_BASE_PATH: /InclusiveAlert
      # Backend API base URL. Set repo variable NEXT_PUBLIC_API_URL (Settings →
      # Secrets and variables → Actions → Variables) to your deployed backend.
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://inclusivealert-api.onrender.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Disable Jekyll (serve _next/ directory)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
